version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: asesoria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: asesoria_user
      POSTGRES_PASSWORD: asesoria123
      POSTGRES_DB: asesoria_ia_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: asesoria_redis
    restart: unless-stopped
    ports:
      - "6379:6379"